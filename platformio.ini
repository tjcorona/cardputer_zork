; -------------------------------------------------------------
; GENERAL PROJECT LAYOUT CONFIGURATION
; -------------------------------------------------------------
[platformio]
default_envs = native_desktop

; -------------------------------------------------------------
; TARGET A: NATIVE MACOS TERMINAL (Your Core Desktop Testbed)
; -------------------------------------------------------------
[env:native_desktop]
platform = native
build_flags = 
    -DNATIVE_DESKTOP
    -std=c++17

; -------------------------------------------------------------
; TARGET B: PHYSICAL HARDWARE (Use this to flash your real Cardputer ADV)
; -------------------------------------------------------------
[env:m5stack-cardputer]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
lib_deps = 
    M5Cardputer@^1.0.3
    M5Unified@^0.1.18
build_flags = 
    -DESP32S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
